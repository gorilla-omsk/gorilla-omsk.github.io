<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORILLA — Админка заказов</title>
    <link rel="icon" type="image/jpeg" href="GGVP.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Russo+One&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #d0d0d0; min-height: 100vh; padding: 20px; }
        h1, h2, h3, button, .btn { font-family: 'Russo One', sans-serif; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; flex-direction: column; gap: 20px;
        }
        .login-screen input {
            padding: 14px 20px; background: #0c0c0c; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #fff; font-size: 15px; width: 280px; text-align: center;
            font-family: 'Inter', sans-serif;
        }
        .login-screen input::placeholder { color: #666; }
        .login-screen button {
            padding: 14px 40px; background: #fff; color: #0a0a0a; border: none;
            border-radius: 100px; cursor: pointer; font-size: 13px; text-transform: uppercase;
            transition: all 0.3s;
        }
        .login-screen button:hover { background: #ccc; transform: translateY(-2px); box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .error { color: #ff3333; font-size: 13px; }

        .admin-screen { display: none; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 30px;
        }
        .header h1 { color: #fff; font-size: 24px; text-transform: uppercase; }
        .header .logout {
            padding: 10px 24px; background: transparent; color: #ff3333;
            border: 1px solid rgba(255,51,51,0.3); border-radius: 100px; cursor: pointer;
            font-size: 11px; text-transform: uppercase; transition: all 0.3s;
        }
        .header .logout:hover { background: rgba(255,51,51,0.1); border-color: #ff3333; }

        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 30px;
        }
        .stat-card {
            background: #0c0c0c; padding: 20px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04); text-align: center;
        }
        .stat-card .num { font-size: 36px; font-weight: 800; color: #fff; }
        .stat-card .label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-top: 4px; }

        .order-card {
            background: #0c0c0c; border: 1px solid rgba(255,255,255,0.04);
            border-radius: 10px; padding: 20px; margin-bottom: 12px;
            transition: all 0.3s;
        }
        .order-card:hover { background: #121212; border-color: rgba(255,255,255,0.1); }
        .order-header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px; margin-bottom: 12px;
        }
        .order-id { color: #fff; font-weight: 700; font-size: 16px; }
        .order-date { color: #888; font-size: 12px; }
        .order-status {
            padding: 5px 14px; border-radius: 100px; font-size: 11px;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }
        .status-new { background: rgba(0,119,255,0.15); color: #0077ff; }
        .status-processing { background: rgba(255,153,51,0.15); color: #ff9933; }
        .status-shipped { background: rgba(76,175,80,0.15); color: #4caf50; }
        .status-delivered { background: rgba(156,39,176,0.15); color: #9c27b0; }
        .status-cancelled { background: rgba(255,51,51,0.15); color: #ff3333; }

        .order-body { margin-bottom: 12px; }
        .order-body p { font-size: 13px; margin: 4px 0; color: #aaa; }
        .order-body strong { color: #ccc; }
        .items-list { margin: 8px 0; padding-left: 18px; }
        .items-list li { font-size: 13px; color: #bbb; margin: 3px 0; }

        .order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .order-actions select {
            padding: 8px 12px; background: #1a1a1a; color: #fff;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif;
        }
        .order-actions button, .order-actions .btn-action {
            padding: 8px 18px; border-radius: 100px; font-size: 11px;
            cursor: pointer; text-transform: uppercase; transition: all 0.3s;
            font-family: 'Russo One', sans-serif; letter-spacing: 1px; border: none;
        }
        .btn-update { background: #0077ff; color: #fff; }
        .btn-update:hover { background: #0066dd; }
        .btn-copy { background: rgba(255,255,255,0.1); color: #ccc; }
        .btn-copy:hover { background: rgba(255,255,255,0.2); }
        .btn-delete { background: transparent; color: #ff3333; border: 1px solid rgba(255,51,51,0.3); }
        .btn-delete:hover { background: rgba(255,51,51,0.1); border-color: #ff3333; }

        .empty { text-align: center; padding: 60px; color: #888; font-size: 14px; letter-spacing: 2px; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #0a0a0a; padding: 12px 28px; border-radius: 100px;
            font-size: 13px; font-weight: 600; z-index: 3000; opacity: 0;
            transition: opacity 0.3s; box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .toast.show { opacity: 1; bottom: 40px; }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; }
            .order-header { flex-direction: column; align-items: flex-start; }
            .order-actions { flex-direction: column; }
            .order-actions select, .order-actions button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ЭКРАН ВХОДА -->
    <div class="login-screen" id="loginScreen">
        <h1 style="color:#fff;font-size:28px;">🦍 GORILLA</h1>
        <p style="color:#888;font-size:13px;letter-spacing:2px;">АДМИН-ПАНЕЛЬ</p>
        <input type="password" id="passwordInput" placeholder="Введите пароль">
        <button id="loginBtn">Войти</button>
        <p class="error" id="loginError"></p>
    </div>

    <!-- АДМИН-ПАНЕЛЬ -->
    <div class="admin-screen" id="adminScreen">
        <div class="header">
            <h1>🦍 Заказы GORILLA</h1>
            <button class="logout" id="logoutBtn">Выйти</button>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div id="ordersContainer">
            <div class="empty">Загрузка заказов...</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ ГЛОБАЛЬНЫЕ ФУНКЦИИ (доступны из HTML) ============
window.updateStatus = function(orderId, newStatus) {
    if (!newStatus) return;
    
    const orders = safeGetItem('gorillaOrders', []);
    const order = orders.find(o => o.id === orderId);
    if (!order) return;
    
    order.status = newStatus;
    safeSetItem('gorillaOrders', orders);
    renderStats();
    renderOrders();
    showToast('✅ Статус заказа #' + orderId + ': ' + newStatus);
};

window.copyOrder = function(orderId) {
    const orders = safeGetItem('gorillaOrders', []);
    const order = orders.find(o => o.id === orderId);
    if (!order) return;
    
    const text = [
        'Заказ: #' + order.id,
        'Дата: ' + order.date,
        'Статус: ' + order.status,
        'Клиент: ' + (order.customer?.name || '—'),
        'Телефон: ' + (order.customer?.phone || '—'),
        order.customer?.city ? 'Город: ' + order.customer.city : '',
        order.customer?.address ? 'Адрес: ' + order.customer.address : '',
        order.customer?.note && order.customer.note !== 'Нет' ? 'Примечание: ' + order.customer.note : '',
        'Доставка: ' + (order.delivery || '—'),
        'Товары:',
        ...(order.items || []).map(i => '  • ' + i.name + (i.size ? ' (' + i.size + ')' : '') + ' — ' + (i.price?.toLocaleString() || 0) + ' ₽'),
        'Итого: ' + (order.total?.toLocaleString() || 0) + ' ₽'
    ].filter(Boolean).join('\n');
    
    navigator.clipboard.writeText(text).then(function() {
        showToast('📋 Заказ скопирован!');
    }).catch(function() {
        showToast('⚠️ Не удалось скопировать');
    });
};

window.deleteOrder = function(orderId) {
    if (!confirm('Удалить заказ #' + orderId + '? Это действие нельзя отменить.')) return;
    
    let orders = safeGetItem('gorillaOrders', []);
    orders = orders.filter(o => o.id !== orderId);
    safeSetItem('gorillaOrders', orders);
    renderStats();
    renderOrders();
    showToast('🗑 Заказ удалён');
};

// ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
function safeGetItem(key, fallback) {
    fallback = fallback || [];
    try {
        var v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
    } catch(e) { return fallback; }
}

function safeSetItem(key, value) {
    try {
        localStorage.setItem(key, JSON.stringify(value));
    } catch(e) {
        showToast('⚠️ Ошибка сохранения');
    }
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ============ АВТОРИЗАЦИЯ ============
var PASSWORD = 'Sofa190925';

function login() {
    var input = document.getElementById('passwordInput').value;
    var error = document.getElementById('loginError');
    
    if (input === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').style.display = 'block';
        loadOrders();
    } else {
        error.textContent = 'Неверный пароль';
        setTimeout(function() { error.textContent = ''; }, 2000);
    }
}

function logout() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('passwordInput').value = '';
}

// ============ ЗАГРУЗКА ЗАКАЗОВ ============
function loadOrders() {
    renderStats();
    renderOrders();
}

function renderStats() {
    var orders = safeGetItem('gorillaOrders', []);
    var total = orders.length;
    var totalRevenue = orders
        .filter(function(o) { return o.status !== 'Отменён'; })
        .reduce(function(sum, o) { return sum + (o.total || 0); }, 0);
    var newCount = orders.filter(function(o) { return o.status === 'Новый'; }).length;
    var inProgress = orders.filter(function(o) { return o.status === 'Обрабатывается' || o.status === 'Отправлен'; }).length;
    var delivered = orders.filter(function(o) { return o.status === 'Доставлен'; }).length;

    document.getElementById('stats').innerHTML = 
        '<div class="stat-card"><div class="num">' + total + '</div><div class="label">Всего заказов</div></div>' +
        '<div class="stat-card"><div class="num">' + totalRevenue.toLocaleString() + ' ₽</div><div class="label">Выручка</div></div>' +
        '<div class="stat-card"><div class="num">' + newCount + '</div><div class="label">Новых</div></div>' +
        '<div class="stat-card"><div class="num">' + inProgress + '</div><div class="label">В работе</div></div>' +
        '<div class="stat-card"><div class="num">' + delivered + '</div><div class="label">Доставлено</div></div>';
}

function renderOrders() {
    var orders = safeGetItem('gorillaOrders', []);
    var container = document.getElementById('ordersContainer');
    
    if (!orders.length) {
        container.innerHTML = '<div class="empty">Заказов пока нет</div>';
        return;
    }

    var sorted = orders.slice().reverse();

    container.innerHTML = sorted.map(function(order) {
        var statusClass = 
            order.status === 'Новый' ? 'status-new' :
            order.status === 'Обрабатывается' ? 'status-processing' :
            order.status === 'Отправлен' ? 'status-shipped' :
            order.status === 'Доставлен' ? 'status-delivered' :
            'status-cancelled';

        return '<div class="order-card" data-id="' + order.id + '">' +
            '<div class="order-header">' +
                '<span class="order-id">#' + order.id + '</span>' +
                '<span class="order-date">' + order.date + '</span>' +
                '<span class="order-status ' + statusClass + '">' + order.status + '</span>' +
            '</div>' +
            '<div class="order-body">' +
                '<p><strong>Клиент:</strong> ' + (order.customer?.name || '—') + '</p>' +
                '<p><strong>Телефон:</strong> ' + (order.customer?.phone || '—') + '</p>' +
                (order.customer?.city ? '<p><strong>Город:</strong> ' + order.customer.city + '</p>' : '') +
                (order.customer?.address ? '<p><strong>Адрес:</strong> ' + order.customer.address + '</p>' : '') +
                (order.customer?.note && order.customer.note !== 'Нет' ? '<p><strong>Примечание:</strong> ' + order.customer.note + '</p>' : '') +
                '<p><strong>Доставка:</strong> ' + (order.delivery || '—') + '</p>' +
                '<p><strong>Товары:</strong></p>' +
                '<ul class="items-list">' +
                    (order.items || []).map(function(i) { 
                        return '<li>' + i.name + (i.size ? ' (' + i.size + ')' : '') + (i.color ? ' [' + i.color + ']' : '') + ' — ' + (i.price?.toLocaleString() || 0) + ' ₽</li>'; 
                    }).join('') +
                '</ul>' +
                '<p><strong>💰 Итого:</strong> <span style="color:#fff;font-weight:700;">' + (order.total?.toLocaleString() || 0) + ' ₽</span></p>' +
            '</div>' +
            '<div class="order-actions">' +
                '<select onchange="updateStatus(\'' + order.id + '\', this.value)">' +
                    '<option value="">Сменить статус</option>' +
                    '<option value="Новый">Новый</option>' +
                    '<option value="Обрабатывается">Обрабатывается</option>' +
                    '<option value="Отправлен">Отправлен</option>' +
                    '<option value="Доставлен">Доставлен</option>' +
                    '<option value="Отменён">Отменён</option>' +
                '</select>' +
                '<button class="btn-action btn-copy" onclick="copyOrder(\'' + order.id + '\')">📋 Копировать</button>' +
                '<button class="btn-action btn-delete" onclick="deleteOrder(\'' + order.id + '\')">🗑 Удалить</button>' +
            '</div>' +
        '</div>';
    }).join('');
}

// ============ ПРИВЯЗКА СОБЫТИЙ ============
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
});

// Автообновление каждые 30 секунд
setInterval(function() {
    if (document.getElementById('adminScreen').style.display !== 'none') {
        loadOrders();
    }
}, 30000);
</script>
</body>
</html>
